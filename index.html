<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Открываем Telegram...</title>
    <style>
        :root {
            --bg: #0d0d14; /* Глубокий темный фон */
            --accent: #00f5d4; /* Яркий акцент как у вас */
            --accent-dim: rgba(0, 245, 212, 0.15);
            --text: #fff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        /* Фоновый градиент для глубины */
        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(circle at 80% 10%, rgba(123, 97, 255, 0.15), transparent 40%),
                        radial-gradient(circle at 20% 90%, rgba(255, 107, 107, 0.1), transparent 40%);
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 20px;
            max-width: 400px;
        }

        /* Стильный заголовок */
        h1 {
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -1px;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        h1 span {
            color: var(--accent);
        }

        /* Инструкция */
        p {
            font-size: 16px;
            opacity: 0.8;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Три точки в тексте */
        .dots {
            display: inline-block;
            transform: translateY(2px);
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* Кнопка-страховка */
        .btn-fallback {
            display: inline-block;
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            font-size: 14px;
            margin-top: 20px;
        }

        /* --- БЛОК СТРЕЛОК И УКАЗАТЕЛЯ --- */
        .guide-block {
            position: absolute;
            top: 20px; /* Учитываем SafeArea */
            right: 20px;
            width: 100px;
            height: 150px;
            z-index: 100;
        }

        /* Мишень (куда нажать) */
        .target {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--accent);
            animation: targetPulse 1.5s infinite;
        }

        @keyframes targetPulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 10px var(--accent); }
            50% { transform: scale(1.4); opacity: 0.7; box-shadow: 0 0 40px var(--accent); }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 10px var(--accent); }
        }

        /* Указательный элемент (три точки) */
        .target-dots {
            position: absolute;
            top: -2px;
            right: 0px;
            color: var(--accent);
            font-size: 30px;
            font-weight: bold;
            letter-spacing: 1px;
            animation: targetDotsPulse 1.5s infinite;
        }
        @keyframes targetDotsPulse {
            0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; }
        }

        /* Анимированные стрелки */
        .arrow {
            position: absolute;
            top: 60px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-top: 6px solid var(--accent);
            border-right: 6px solid var(--accent);
            transform: rotate(-45deg);
            opacity: 0;
            animation: arrowAnim 1s ease-out infinite;
        }

        /* Смещение стрелок для создания потока */
        .arrow-1 { animation-delay: 0s; top: 100px; }
        .arrow-2 { animation-delay: 0.2s; top: 80px; }
        .arrow-3 { animation-delay: 0.4s; top: 60px; }

        @keyframes arrowAnim {
            0% { transform: rotate(-45deg) translate(-20px, 20px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: rotate(-45deg) translate(0px, 0px); opacity: 0; }
        }

        /*SafeArea для современных iPhone */
        @supports(padding: max(0px)){
            .guide-block { top: calc(max(20px, env(safe-area-inset-top)) + 5px); }
            .container { padding-top: env(safe-area-inset-top); }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="guide-block">
        <div class="target-dots">•••</div>
        <div class="arrow arrow-1"></div>
        <div class="arrow arrow-2"></div>
        <div class="arrow arrow-3"></div>
    </div>

    <div class="container">
        <h1><span>Почти</span> готово!</h1>
        <p>Мы не можем открыть Telegram прямо здесь.<br><br>Пожалуйста, нажмите на <strong>три точки</strong> <span class="dots">(•••)</span> вверху и выберите <br><strong>«Открыть в браузере»</strong>.</p>
        
        <a href="https://t.me/ВАША_ССЫЛКА_ТУТ" class="btn-fallback">Или нажмите тут для перехода</a>
    </div>

</body>
</html>
